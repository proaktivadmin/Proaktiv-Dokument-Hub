# Docker runs on homelab (Proxmox LXC) only — not on this PC.
# Deploy: .\scripts\deploy-homelab.ps1
# App: http://192.168.77.127:3000

services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: dokument-hub-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dokument_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dokument-hub-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    environment:
      # Use DATABASE_URL from .env.docker (Railway) for real data. For local db only, override with:
      # - DATABASE_URL=postgresql://postgres:postgres@db:5432/dokument_hub
      # APP_USERS_JSON: set in docker-compose to avoid $ parsing in env_file
      - APP_USERS_JSON=[{"email":"froyland@proaktiv.no","password_hash":"$$2b$$12$$jKvACt5Ld5qIU9UioNYgXezut42FNcBBtDgQx6XFJX47kzy6Ch8FK"}]
      - LOG_LEVEL=DEBUG
      - DEBUG=true
      - DB_HOST=db
      - DB_PORT=5432
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts
      - ./library:/app/library
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]

  # Next.js Frontend (production build — identical to Vercel for parity testing)
  # Use `docker compose up` for production-parity; use `docker compose --profile dev up` for hot reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    container_name: dokument-hub-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      - backend

  # Dev frontend (hot reload) — use only when you need fast iteration
  # Run: docker compose --profile dev up frontend-dev
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    container_name: dokument-hub-frontend-dev
    ports:
      - "3001:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    command: npm run dev
    profiles:
      - dev

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
